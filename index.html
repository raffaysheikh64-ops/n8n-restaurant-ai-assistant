<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taste of Lahore</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #1a0a00; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .hero { text-align: center; margin-bottom: 40px; }
    .hero-label { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #c8a96e; margin-bottom: 12px; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); color: #f5ede0; line-height: 1.1; margin-bottom: 10px; }
    .hero-title span { color: #c8a96e; }
    .hero-sub { font-size: 14px; color: #8a7060; margin-top: 8px; }
    .chat-wrap { width: 100%; max-width: 480px; background: #120600; border: 1px solid #3a2010; border-radius: 16px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.6); }
    .chat-header { background: #1e0d02; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #3a2010; }
    .chat-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, #c8a96e, #8b5e2a); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .chat-header-info .name { font-size: 14px; font-weight: 500; color: #f5ede0; }
    .chat-header-info .status { font-size: 11px; color: #4caf50; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .status-dot { width: 6px; height: 6px; background: #4caf50; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .chat-messages { height: 360px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: #3a2010 transparent; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #3a2010; border-radius: 4px; }
    .msg { display: flex; flex-direction: column; max-width: 80%; gap: 4px; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.55; white-space: pre-wrap; }
    .msg.bot .msg-bubble { background: #1e0d02; border: 1px solid #3a2010; color: #e8d5bc; border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: linear-gradient(135deg, #c8a96e, #8b5e2a); color: #1a0a00; font-weight: 500; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: #5a4030; padding: 0 4px; }
    .msg.user .msg-time { text-align: right; }
    .typing { display: none; align-self: flex-start; }
    .typing.show { display: flex; }
    .typing-bubble { background: #1e0d02; border: 1px solid #3a2010; border-radius: 14px; border-bottom-left-radius: 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
    .typing-dot { width: 6px; height: 6px; background: #c8a96e; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .chat-input-wrap { padding: 16px 20px; border-top: 1px solid #3a2010; display: flex; gap: 10px; align-items: center; background: #1a0a00; }
    .chat-input { flex: 1; background: #1e0d02; border: 1px solid #3a2010; border-radius: 24px; padding: 10px 16px; color: #f5ede0; font-size: 13.5px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .chat-input::placeholder { color: #5a4030; }
    .chat-input:focus { border-color: #c8a96e; }
    .send-btn { width: 40px; height: 40px; background: linear-gradient(135deg, #c8a96e, #8b5e2a); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
    .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; fill: #1a0a00; }
    .quick-replies { padding: 0 20px 14px; display: flex; gap: 8px; flex-wrap: wrap; }
    .qr-btn { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 1px solid #3a2010; background: transparent; color: #c8a96e; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; white-space: nowrap; }
    .qr-btn:hover { background: #c8a96e; color: #1a0a00; border-color: #c8a96e; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-label">Lahore's Finest</div>
    <h1 class="hero-title">Taste of <span>Lahore</span></h1>
    <p class="hero-sub">Main Boulevard Gulberg · Open daily 12pm – 12am</p>
  </div>
  <div class="chat-wrap">
    <div class="chat-header">
      <div class="chat-avatar">🍛</div>
      <div class="chat-header-info">
        <div class="name">Lahore Assistant</div>
        <div class="status"><span class="status-dot"></span> Online now</div>
      </div>
    </div>
    <div class="chat-messages" id="messages">
      <div class="msg bot">
        <div class="msg-bubble">Assalam o Alaikum! 👋 Welcome to Taste of Lahore. I can help you with our menu, timings, location, or reservations. How can I assist you today?</div>
        <div class="msg-time">Just now</div>
      </div>
    </div>
    <div class="typing" id="typing">
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
    <div class="quick-replies">
      <button class="qr-btn" onclick="sendQuick('What is your menu?')">🍽️ Menu</button>
      <button class="qr-btn" onclick="sendQuick('What are your timings?')">🕐 Timings</button>
      <button class="qr-btn" onclick="sendQuick('Where are you located?')">📍 Location</button>
      <button class="qr-btn" onclick="sendQuick('I want to make a reservation')">📅 Reserve</button>
    </div>
    <div class="chat-input-wrap">
      <input class="chat-input" id="userInput" type="text" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
  <script>
const WEBHOOK_URL = 'YOUR_N8N_PRODUCTION_WEBHOOK_URL_HERE';
    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(text, role) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      document.getElementById('typing').classList.remove('show');
    }

    function setLoading(val) {
      document.getElementById('typing').classList.toggle('show', val);
      document.getElementById('sendBtn').disabled = val;
      document.getElementById('userInput').disabled = val;
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      appendMessage(text, 'user');
      setLoading(true);

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        let reply = '';
        const contentType = res.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          const data = await res.json();
          reply = data.text || data.message || data.output || JSON.stringify(data);
        } else {
          reply = await res.text();
        }

        appendMessage(reply || 'No response received.', 'bot');
      } catch (err) {
        appendMessage('Connection error. Please try again! 🙏', 'bot');
        console.error(err);
      }

      setLoading(false);
    }

    function sendQuick(text) {
      document.getElementById('userInput').value = text;
      sendMessage();
    }
  </script>
</body>
</html>
